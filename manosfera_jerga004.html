<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esfera 3D - Sistema Amor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            background-color: #e5e5e5;
            margin: 0;
            overflow: hidden;
            font-family: 'Lora', serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Pantalla de inicio */
        #overlay {
            position: fixed;
            inset: 0;
            background: #ffffff; /* Fondo blanco */
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
        }

        .start-btn {
            background: #f0f0f0; /* Gris suave */
            border: 1px solid #d1d1d1;
            color: #666666; /* Texto gris oscuro suave */
            padding: 12px 35px;
            font-family: 'Lora', serif;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: lowercase;
            letter-spacing: 0.15em;
            border-radius: 50px; /* Bordes suaves/redondeados */
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .start-btn:hover {
            background: #e8e8e8;
            color: #333333;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            transform: translateY(-2px);
        }

        #container {
            width: 100%;
            height: 100%;
            perspective: 2000px;
            touch-action: none;
            display: none; 
            cursor: grab;
        }

        #container:active { cursor: grabbing; }

        .word-node {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            user-select: none;
            transform-origin: center center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.3s;
        }

        .word-image {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 6px;
            background: rgba(0,0,0,0.05);
        }

        .word-text {
            font-size: 3.5rem; 
            line-height: 0.8;
            letter-spacing: -0.05em;
            color: #000000;
            font-weight: 900; 
            white-space: nowrap;
        }

        .can-scale:hover {
            transform: scale(2.5) !important;
            z-index: 999999 !important;
            color: #ff0000 !important;
        }

        #ui-hint {
            position: fixed;
            bottom: 20px;
            font-size: 0.85rem;
            color: #333;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            pointer-events: none;
            background: rgba(255,255,255,0.7);
            padding: 8px 20px;
            border-radius: 30px;
            font-family: sans-serif;
            z-index: 1000;
            display: none;
        }
        @media (max-width: 768px) {

    .word-text {
        font-size: 1.5rem;
    }

    .word-image {
        width: 40px;
        height: 40px;
    }

    .start-btn {
        font-size: 0.9rem;
        padding: 10px 25px;
    }

    #ui-hint {
        font-size: 0.65rem;
    }
}
    </style>
</head>
<body>

    <div id="overlay">
        <button class="start-btn" onclick="enterFullscreen()">manosfera</button>
    </div>

    <div id="ui-hint">Arrastra para rotar</div>
    <div id="container"></div>

    <script>
        function enterFullscreen() {
            const doc = document.documentElement;
            // Intentar pantalla completa
            if (doc.requestFullscreen) {
                doc.requestFullscreen();
            } else if (doc.webkitRequestFullscreen) {
                doc.webkitRequestFullscreen();
            } else if (doc.msRequestFullscreen) {
                doc.msRequestFullscreen();
            }

            // Transición suave de salida para ocultar el overlay
            const overlay = document.getElementById('overlay');
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                document.getElementById('container').style.display = 'block';
                document.getElementById('ui-hint').style.display = 'block';
                init();
            }, 800);
        }

        let camera, scene, group;
        let targetRotationX = 0, targetRotationY = 0;
        let currentRotationX = 0, currentRotationY = 0;
        let isDragging = false;
        let previousMouseX = 0, previousMouseY = 0;
        let dragDistance = 0;

        // Grupos de jerga modificados según la solicitud

        // Blue Pill (Sin 'bluepill', con 'npc' y 'cope')
        const bluePillTargets = ["personality", "normie", "cuck", "whiteknight", "orbiters", "simp", "soyboy", "npc", "copers"];
        
        // Red Pill (Sin 'redpill', con 'looksmaxxing', 'softmaxxing', 'hardmaxxing' y 'rating')
        const redPillTargets = ["alpha", "hypergamy", "smv", "gynocentrism", "awalt", "chad", "looksmaxxing", "softmaxxing", "hardmaxxing", "rating"];
        
        // Black Pill (Sin 'blackpill', 'incel', 'looksmaxxing', 'moneymaxxing', 'gymmaxxing', 'mogged'; con 'mgtow', 'mra', truecel, ldar, doom, foid, copers, roping, er, over)
        const blackPillTargets = ["subfive", "ldar", "doom", "foid", "copers", "truecel", "roping", "er", "over", "mgtow", "mra"];

        // Lista combinada para aplicar la escala visual en el hover
        const grammarTargets = [...bluePillTargets, ...redPillTargets, ...blackPillTargets];

        // Texto adaptado con los términos clave integrados lógicamente
        const fullText = `The manosphere is structured around complex beliefs explaining modern social dynamics. Some adhere to the bluepill philosophy, emphasizing personality and social norms, though critics dismiss them as a simple normie, a submissive cuck, a desperate simp, a submissive soyboy, a brainless npc, or a delusional whiteknight serving as passive orbiters who always cope with their reality. Others transition to the redpill perspective, seeking to become an alpha, analyzing hypergamy, focusing on high smv, studying the mechanics of gynocentrism, and accepting the doctrine of awalt as a reality of human behavior while trying to raise their rating, aspiring to live like a chad. They often try looksmaxxing through softmaxxing or even hardmaxxing to improve their status. However, blackpillers mock them as delusional copers who refuse to accept genetics. Finally, those who see no hope accept the blackpill, embracing the identity of an isolated truecel who views himself as a permanent subfive, choosing to ldar because they believe their absolute doom is sealed, sometimes leading to thoughts of roping, realizing that it's over, or even contemplating going er in a gynocentric world where a foid holds all the power, while others simply withdraw into mgtow or join mra groups.`;

        function init() {
            const container = document.getElementById('container');
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 10000);
            camera.position.z = window.innerWidth < 768 ? 1200 : 2200;
            scene = new THREE.Scene();
            group = new THREE.Group();
            scene.add(group);

            const words = fullText.split(/\s+/).filter(w => w.length > 0);
            const radius = window.innerWidth < 768 ? 450 : 900;

            words.forEach((word, i) => {
                const phi = Math.acos(-1 + (2 * i) / words.length);
                const theta = Math.sqrt(words.length * Math.PI) * phi;

                const node = document.createElement('div');
                node.className = 'word-node';

                const cleanWord = word.toLowerCase().replace(/[.,;:()"]/g, "");
                let targetUrl = null;

                // Validación de grupo para asignación de URLs específicas
                if (bluePillTargets.includes(cleanWord)) {
                    node.classList.add('can-scale');
                    targetUrl = "bluepill.html";
                } else if (redPillTargets.includes(cleanWord)) {
                    node.classList.add('can-scale');
                    targetUrl = "redpill.html";
                } else if (blackPillTargets.includes(cleanWord)) {
                    node.classList.add('can-scale');
                    targetUrl = "blackpill.html";
                }

                // Configuración de eventos de redirección evitando falsos clics por arrastre
                if (targetUrl) {
                    node.style.cursor = 'pointer';
                    node.addEventListener('click', (e) => {
                        if (dragDistance > 15) return;
                        window.open(targetUrl, '_blank');
                    });
                }

                const img = document.createElement('img');
                img.className = 'word-image';
                img.src = 'imagen.jpg';
                img.onerror = () => img.style.display = 'none';

                const span = document.createElement('span');
                span.className = 'word-text';
                span.textContent = word;

                node.appendChild(img);
                node.appendChild(span);

                const object = new THREE.Object3D();
                object.position.x = radius * Math.sin(phi) * Math.cos(theta);
                object.position.y = radius * Math.sin(phi) * Math.sin(theta);
                object.position.z = radius * Math.cos(phi);

                object.userData.element = node;
                container.appendChild(node);
                group.add(object);
            });

            // Captura de eventos para rotación de la esfera
            window.addEventListener('mousedown', (e) => { 
                isDragging = true; 
                previousMouseX = e.clientX; 
                previousMouseY = e.clientY; 
                dragDistance = 0; // Reiniciar distancia acumulada
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const deltaX = e.clientX - previousMouseX;
                const deltaY = e.clientY - previousMouseY;
                
                targetRotationY += deltaX * 0.005;
                targetRotationX += deltaY * 0.005;
                
                // Acumular la distancia de arrastre
                dragDistance += Math.abs(deltaX) + Math.abs(deltaY);
                
                previousMouseX = e.clientX; 
                previousMouseY = e.clientY;
            });

            window.addEventListener('mouseup', () => isDragging = false);
            
            window.addEventListener('wheel', (e) => {
                targetRotationY += e.deltaX * 0.001;
                targetRotationX += e.deltaY * 0.001;
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            currentRotationY += (targetRotationY - currentRotationY) * 0.07;
            currentRotationX += (targetRotationX - currentRotationX) * 0.07;
            group.rotation.y = currentRotationY;
            group.rotation.x = currentRotationX;

            const widthHalf = window.innerWidth / 2;
            const heightHalf = window.innerHeight / 2;

            group.children.forEach(obj => {
                const vector = new THREE.Vector3();
                obj.getWorldPosition(vector);
                vector.project(camera);

                const x = (vector.x * widthHalf) + widthHalf;
                const y = -(vector.y * heightHalf) + heightHalf;
                const element = obj.userData.element;

                if (vector.z < 1) {
                    element.style.display = 'flex';
                    element.style.left = x + 'px';
                    element.style.top = y + 'px';
                    
                    const depthScale = (1.5 - vector.z) * 0.8;
                    element.style.zIndex = Math.round((1 - vector.z) * 10000);
                    
                    if (!element.matches(':hover')) {
                        element.style.transform = `translate(-50%, -50%) scale(${depthScale})`;
                    }
                } else {
                    element.style.display = 'none';
                }
            });
        }

        window.addEventListener('resize', () => {
            if(camera) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
            }
        });
    </script>
</body>
</html>
